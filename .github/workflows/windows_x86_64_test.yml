name: Windows x86_64

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows_x86_64_test.yml'
      - 'firescript/**'
      - 'tests/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/windows_x86_64_test.yml'
      - 'firescript/**'
      - 'tests/**'

jobs:
  windows_x86_64_test:
    # firescript compiles directly to native Windows x86_64 executables with its
    # own assembler and PE writer — no external toolchain. Python is the only
    # requirement.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run unified test suite
        run: python tests/run.py --profile ci
