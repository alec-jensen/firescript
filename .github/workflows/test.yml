name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - 'firescript/**'
      - 'tests/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - 'firescript/**'
      - 'tests/**'

jobs:
  test:
    # firescript compiles directly to native Windows x64 machine code and
    # links freestanding binaries against kernel32 only. The compiler needs
    # MinGW-w64 binutils (as, ld) and objdump; no C compiler is involved.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up MSYS2 with MinGW-w64 binutils
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-binutils
          path-type: inherit
          release: false

      - name: Add UCRT64 to PATH
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Verify toolchain
        run: |
          as --version
          ld --version
          objdump --version

      - name: Run unified test suite
        run: python tests/run_tests.py
