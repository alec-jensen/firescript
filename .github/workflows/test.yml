name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - 'firescript/**'
      - 'tests/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - 'firescript/**'
      - 'tests/**'

jobs:
  test:
    # firescript compiles directly to native Windows x64 executables with its
    # own assembler and PE writer — no external toolchain. Python is the only
    # requirement.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run unified test suite
        run: python tests/run_tests.py
